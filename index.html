<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carretrans S.R.L. | Muy pronto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <div class="logo-box">
                <!-- Usará el archivo Sin-título-1.jpg que ya tienes -->
                <img src="Sin-título-1.jpg" alt="Carretrans Logo" class="logo">
            </div>
            <h1 class="brand">CARRETRANS <span>S.R.L.</span></h1>
            <p class="tagline">Transporte y Logística</p>
        </header>

        <div class="countdown">
            <div class="unit"><span id="days">30</span><p>Días</p></div>
            <div class="unit"><span id="hours">00</span><p>Horas</p></div>
            <div class="unit"><span id="minutes">00</span><p>Min</p></div>
            <div class="unit"><span id="seconds">00</span><p>Seg</p></div>
        </div>

        <div class="contact-section">
            <p>Para cualquier información o consultas, contáctanos en:</p>
            <a href="mailto:informaciones@carretrans.com" class="email-link">informaciones@carretrans.com</a>
            <div style="margin-top: 20px;">
                <a href="mailto:informaciones@carretrans.com" class="btn">ENVIAR CORREO</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
