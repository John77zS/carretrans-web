<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carretrans Srl | Sitio en Construcción</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <!-- Logo y Título -->
        <header>
            <div class="logo-container">
                <h1 class="brand">CARRETRANS <span class="suffix">Srl</span></h1>
                <div class="divider"></div>
                <p class="subtitle">SOLUCIONES INTEGRALES EN TRANSPORTE</p>
            </div>
            <h2 class="status-text">Nuestro sitio web estará listo pronto</h2>
        </header>

        <!-- Contador -->
        <div class="countdown-container">
            <div class="time-box">
                <span id="days">30</span>
                <p>días</p>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <p>horas</p>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <p>minutos</p>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <p>segundos</p>
            </div>
        </div>

        <!-- Formulario -->
        <div class="notify-section">
            <h3>NOTIFÍCAME EL LANZAMIENTO</h3>
            <form class="subscribe-form">
                <input type="email" placeholder="Tu correo electrónico" required>
                <button type="submit">ENVIAR</button>
            </form>
        </div>

        <!-- Redes Sociales -->
        <footer>
            <div class="social-links">
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
                <a href="#">LinkedIn</a>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
